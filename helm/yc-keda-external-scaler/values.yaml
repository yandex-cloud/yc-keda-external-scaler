replicaCount: 2

nameOverride: ""
fullnameOverride: ""

image:
  repository: cr.yandex/sol/keda/yc-keda-external-scaler
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

# Application configuration
config:
  iamEndpoint: "https://iam.api.cloud.yandex.net"
  monitoringEndpoint: "https://monitoring.api.cloud.yandex.net"
  
  grpcPort: 8080
  httpPort: 8081
  healthPath: "/health"
  
  keyPath: "/app/key.json"
  
  apiTimeout: "30s"

# ServiceAccount configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

# High Availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Pod anti-affinity configuration
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - '{{ include "yc-keda-external-scaler.name" . }}'
        topologyKey: kubernetes.io/hostname

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

# HPA
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
    - ALL

# Deprecated: used only as an existing Secret fallback when secret.create=false.
secretName: ""

secret:
  create: true
  existingSecret: ""
  name: ""
  key: sa-key.json
  data: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
