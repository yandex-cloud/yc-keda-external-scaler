apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yc-keda-external-scaler.fullname" . }}
  labels:
    {{- include "yc-keda-external-scaler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "yc-keda-external-scaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "yc-keda-external-scaler.selectorLabels" . | nindent 8 }}
      {{- if and (eq (include "yc-keda-external-scaler.authMethod" .) "authorizedKey") .Values.secret.create (not .Values.secret.existingSecret) }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yc-keda-external-scaler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scaler
          image: {{ include "yc-keda-external-scaler.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: AUTH_METHOD
              value: {{ include "yc-keda-external-scaler.authMethod" . | quote }}
            - name: IAM_ENDPOINT
              value: {{ .Values.config.iamEndpoint | quote }}
            - name: MONITORING_ENDPOINT
              value: {{ .Values.config.monitoringEndpoint | quote }}
            - name: GRPC_PORT
              value: {{ .Values.config.grpcPort | quote }}
            - name: HTTP_PORT
              value: {{ .Values.config.httpPort | quote }}
            - name: HEALTH_PATH
              value: {{ .Values.config.healthPath | quote }}
            {{- if eq (include "yc-keda-external-scaler.authMethod" .) "workloadIdentityFederation" }}
            - name: WLIF_SERVICE_ACCOUNT_ID
              value: {{ .Values.auth.workloadIdentityFederation.serviceAccountID | quote }}
            - name: WLIF_TOKEN_EXCHANGE_URL
              value: {{ .Values.auth.workloadIdentityFederation.tokenExchangeURL | quote }}
            - name: WLIF_SUBJECT_TOKEN_FILE
              value: {{ .Values.auth.workloadIdentityFederation.subjectTokenPath | quote }}
            {{- else }}
            - name: KEY_PATH
              value: {{ .Values.config.keyPath | quote }}
            {{- end }}
            - name: API_TIMEOUT
              value: {{ .Values.config.apiTimeout | quote }}
          ports:
            - containerPort: {{ .Values.config.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.config.httpPort }}
              name: http
              protocol: TCP
          volumeMounts:
            {{- if eq (include "yc-keda-external-scaler.authMethod" .) "workloadIdentityFederation" }}
            - name: wlif-token
              mountPath: {{ dir .Values.auth.workloadIdentityFederation.subjectTokenPath | quote }}
              readOnly: true
            {{- else }}
            - name: sa-key
              mountPath: {{ .Values.config.keyPath | quote }}
              subPath: {{ .Values.secret.key | quote }}
              readOnly: true
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.config.healthPath }}
              port: {{ .Values.config.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: {{ .Values.config.healthPath }}
              port: {{ .Values.config.httpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.config.healthPath }}
              port: {{ .Values.config.httpPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if eq (include "yc-keda-external-scaler.authMethod" .) "workloadIdentityFederation" }}
        - name: wlif-token
          projected:
            defaultMode: 0400
            sources:
              - serviceAccountToken:
                  path: {{ base .Values.auth.workloadIdentityFederation.subjectTokenPath | quote }}
                  expirationSeconds: {{ .Values.auth.workloadIdentityFederation.tokenExpirationSeconds }}
                  audience: {{ required "auth.workloadIdentityFederation.audience is required when WLIF is enabled" .Values.auth.workloadIdentityFederation.audience | quote }}
        {{- else }}
        - name: sa-key
          secret:
            secretName: {{ include "yc-keda-external-scaler.secretName" . }}
            defaultMode: 0400
        {{- end }}
