{{- if and (eq (include "yc-keda-external-scaler.authMethod" .) "authorizedKey") .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yc-keda-external-scaler.secretName" . }}
  labels:
    {{- include "yc-keda-external-scaler.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secret.key | quote }}: {{ required "secret.data is required when the chart creates the Secret" .Values.secret.data | b64enc }}
{{- end }}
